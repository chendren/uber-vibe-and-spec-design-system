<!-- @dsCard group="Slides" viewport="1280x720" name="Comparison slide" subtitle="Vibe vs Spec side-by-side." -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{ margin:0; background:var(--sand-50); }
  .slide{ width:1280px; height:720px; position:relative; overflow:hidden; background:var(--sand-50);
    padding:84px; box-sizing:border-box; display:flex; flex-direction:column; }
  .eyebrow{ font-family:var(--font-mono); font-size:14px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-500); text-align:center; }
  h2{ font-family:var(--font-display); font-size:50px; line-height:1.05; letter-spacing:-0.025em; font-weight:500; color:var(--ink-900); margin:12px 0 0; text-align:center; }
  .cols{ margin-top:48px; display:grid; grid-template-columns:1fr auto 1fr; gap:28px; align-items:stretch; }
  .panel{ border-radius:var(--radius-xl); padding:40px; display:flex; flex-direction:column; gap:18px; }
  .vibe{ background:var(--clay-50); border:1.5px solid var(--clay-200); }
  .spec{ background:var(--teal-50); border:1.5px solid var(--teal-200); }
  .ic{ width:56px; height:56px; border-radius:14px; display:flex; align-items:center; justify-content:center; }
  .ic svg{ width:28px; height:28px; }
  .vibe .ic{ background:var(--clay-500); color:var(--sand-50); }
  .spec .ic{ background:var(--teal-500); color:var(--sand-50); }
  .tag{ font-family:var(--font-mono); font-size:13px; letter-spacing:0.14em; text-transform:uppercase; font-weight:500; }
  .vibe .tag{ color:var(--clay-700); }
  .spec .tag{ color:var(--teal-700); }
  .panel h3{ font-family:var(--font-display); font-size:32px; font-weight:500; letter-spacing:-0.02em; margin:0; color:var(--ink-900); }
  ul{ list-style:none; padding:0; margin:6px 0 0; display:flex; flex-direction:column; gap:13px; }
  li{ display:flex; gap:12px; align-items:flex-start; font-size:18px; color:var(--ink-800); line-height:1.4; }
  li svg{ width:19px; height:19px; flex:none; margin-top:2px; }
  .vibe li svg{ color:var(--clay-500); }
  .spec li svg{ color:var(--teal-500); }
  .mid{ display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-style:italic; font-size:26px; color:var(--ink-400); }
</style></head>
<body>
  <div class="slide">
    <div class="eyebrow">The two modes</div>
    <h2>Vibe and Spec, side by side</h2>
    <div class="cols">
      <div class="panel vibe">
        <div class="ic"><i data-lucide="waves"></i></div>
        <div class="tag">Vibe</div>
        <h3>Build it by feel</h3>
        <ul>
          <li><i data-lucide="check"></i> Explore fast, discover the shape</li>
          <li><i data-lucide="check"></i> Converse, prompt, iterate</li>
          <li><i data-lucide="check"></i> Best for prototypes &amp; unknowns</li>
        </ul>
      </div>
      <div class="mid">and</div>
      <div class="panel spec">
        <div class="ic"><i data-lucide="ruler"></i></div>
        <div class="tag">Spec</div>
        <h3>Ship it by spec</h3>
        <ul>
          <li><i data-lucide="check"></i> Plan, constrain, then build</li>
          <li><i data-lucide="check"></i> Tests &amp; types as guardrails</li>
          <li><i data-lucide="check"></i> Best for production &amp; scale</li>
        </ul>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body></html>
