<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--color-surface-sunken);padding:24px;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--color-text-subtle);margin:18px 0 10px}
  .badges{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .keys{display:flex;gap:14px;align-items:center;font-size:14px;color:var(--color-text-muted)}
</style></head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="../ds-card-boot.js"></script>
  <script type="text/babel">
    window.__mount = function(){
    const { Card, Badge, Kbd } = window.UberVibeAndSpecDesignSystem_37e707;
    function Demo(){
      return (<>
        <div className="grid">
          <Card eyebrow="Module 03" title="Spec-driven development">
            Write the plan, constraints, and tests first — then drive Claude precisely.
          </Card>
          <Card variant="raised" interactive eyebrow="Module 01" title="Vibe coding">
            Feel your way toward a solution. Let the model riff, then formalize.
          </Card>
        </div>
        <p className="lbl">Badges</p>
        <div className="badges">
          <Badge variant="clay" mono>VIBE</Badge>
          <Badge variant="teal" mono>SPEC</Badge>
          <Badge variant="success" dot>Enrolling</Badge>
          <Badge variant="neutral">Beginner</Badge>
          <Badge variant="warning">Waitlist</Badge>
          <Badge variant="solid">Live cohort</Badge>
        </div>
        <p className="lbl">Keyboard</p>
        <div className="keys">
          <span>Search&nbsp; <Kbd keys={['⌘','K']}/></span>
          <span>Accept&nbsp; <Kbd keys={['⌘','Enter']}/></span>
          <span>Cancel&nbsp; <Kbd>Esc</Kbd></span>
        </div>
      </>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
    };
    __bootCard('../../');
  </script>
</body></html>
