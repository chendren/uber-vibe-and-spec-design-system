<!-- @dsCard group="Colors" viewport="700x180" name="Brand pairing — clay × teal" subtitle="The two-temperature core. Warm Vibe, cool Spec, warm neutrals between." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--color-bg);font-family:var(--font-sans);padding:0}
  .bar{display:flex;height:140px}
  .seg{flex:1;display:flex;align-items:flex-end;padding:14px;color:#fff}
  .seg .t{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em}
  .clay{background:var(--color-primary)}
  .sand{background:var(--sand-200);color:var(--ink-800)}
  .teal{background:var(--color-accent)}
  .ink{background:var(--ink-900)}
  .lab{position:absolute;top:14px;left:14px;font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.85}
  .seg{position:relative}
</style></head><body>
  <div class="bar">
    <div class="seg clay"><span class="lab">Vibe</span><span class="t">clay-500</span></div>
    <div class="seg sand"><span class="lab" style="color:var(--ink-600)">Neutral</span><span class="t">sand-200</span></div>
    <div class="seg teal"><span class="lab">Spec</span><span class="t">teal-500</span></div>
    <div class="seg ink"><span class="lab">Text</span><span class="t">ink-900</span></div>
  </div>
</body></html>
