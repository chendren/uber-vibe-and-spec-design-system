<!-- @dsCard group="Spacing" viewport="700x170" name="Radii" subtitle="Soft, generous corners — part of the warmth. Cards 18px, buttons 12px." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--color-surface);padding:24px 28px;font-family:var(--font-mono)}
  .row{display:flex;gap:20px;align-items:flex-end}
  .cell{display:flex;flex-direction:column;gap:8px;align-items:center}
  .box{width:84px;height:64px;background:var(--clay-100);border:1.5px solid var(--clay-400)}
  .t{font-size:11px;color:var(--color-text-muted)}
</style></head><body>
  <div class="row">
    <div class="cell"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="t">xs · 4</span></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="t">sm · 8</span></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-md)"></div><span class="t">md · 12</span></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="t">lg · 18</span></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="t">xl · 28</span></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-pill)"></div><span class="t">pill</span></div>
  </div>
</body></html>
