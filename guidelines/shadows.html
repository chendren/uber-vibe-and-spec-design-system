<!-- @dsCard group="Spacing" viewport="700x190" name="Elevation / shadows" subtitle="Warm ink-tinted, diffuse. Elevation, not drop-shadow soup." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--color-surface-sunken);padding:28px;font-family:var(--font-mono)}
  .row{display:flex;gap:26px;align-items:center;justify-content:center}
  .cell{display:flex;flex-direction:column;gap:12px;align-items:center}
  .box{width:96px;height:64px;background:var(--color-surface);border-radius:var(--radius-md)}
  .t{font-size:11px;color:var(--color-text-muted)}
</style></head><body>
  <div class="row">
    <div class="cell"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="t">xs</span></div>
    <div class="cell"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="t">sm</span></div>
    <div class="cell"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="t">md</span></div>
    <div class="cell"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="t">lg</span></div>
    <div class="cell"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="t">xl</span></div>
  </div>
</body></html>
