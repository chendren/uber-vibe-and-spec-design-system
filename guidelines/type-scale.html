<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--color-surface);padding:22px 28px}
  .row{display:flex;align-items:baseline;gap:16px;padding:5px 0;border-bottom:1px solid var(--sand-200)}
  .row:last-child{border:0}
  .spec{font-family:var(--font-mono);font-size:11px;color:var(--color-text-subtle);width:120px;flex:none}
  .samp{font-family:var(--font-display);color:var(--color-text);line-height:1.1;letter-spacing:-0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style></head><body>
  <div class="row"><span class="spec">5xl · 88</span><span class="samp" style="font-size:44px">Display</span></div>
  <div class="row"><span class="spec">3xl · 48</span><span class="samp" style="font-size:38px">Title</span></div>
  <div class="row"><span class="spec">2xl · 36</span><span class="samp" style="font-size:30px">Heading</span></div>
  <div class="row"><span class="spec">xl · 28</span><span class="samp" style="font-size:24px">Subhead</span></div>
  <div class="row"><span class="spec">md · 18</span><span class="samp" style="font-size:18px;font-family:var(--font-sans)">Body — Hanken Grotesk</span></div>
  <div class="row"><span class="spec">sm · 13</span><span class="samp" style="font-size:13px;font-family:var(--font-sans)">Label</span></div>
</body></html>
