<!-- @dsCard group="Type" viewport="700x190" name="Mono — JetBrains Mono & spec labels" subtitle="Code, terminals, keys — and our uppercase wide-tracked spec label." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--color-surface);padding:24px 28px;font-family:var(--font-mono)}
  .label{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--color-accent);font-weight:500}
  .code{font-size:15px;color:var(--color-text);margin:14px 0 0;line-height:1.6}
  .code .p{color:var(--color-accent)}
  .code .c{color:var(--color-text-subtle)}
  .meta{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;color:var(--color-text-subtle);margin-top:16px;text-transform:uppercase}
</style></head><body>
  <div class="label">Module 03 · Spec-driven</div>
  <div class="code"><span class="c"># start a session</span><br><span class="p">~ ❯</span> claude "write a spec for the auth flow"</div>
  <div class="meta">JetBrains Mono · 400 / 500 / 700</div>
</body></html>
