<!-- @dsCard group="Spacing" viewport="700x230" name="Spacing scale" subtitle="4px base grid. Compose with gap, not margins." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--color-surface);padding:20px 28px;font-family:var(--font-mono)}
  .row{display:flex;align-items:center;gap:14px;padding:3px 0}
  .tok{width:84px;font-size:11px;color:var(--color-text-subtle)}
  .px{width:46px;font-size:11px;color:var(--color-text-muted);text-align:right}
  .bar{height:14px;background:var(--color-primary);border-radius:3px}
</style></head><body>
  <div id="r"></div>
  <script>
    const items=[['--space-1','4px'],['--space-2','8px'],['--space-3','12px'],['--space-4','16px'],['--space-5','24px'],['--space-6','32px'],['--space-7','48px'],['--space-8','64px']];
    const r=document.getElementById('r');
    items.forEach(([t,px])=>{
      r.insertAdjacentHTML('beforeend',`<div class="row"><span class="tok">${t}</span><span class="px">${px}</span><div class="bar" style="width:${px}"></div></div>`);
    });
  </script>
</body></html>
